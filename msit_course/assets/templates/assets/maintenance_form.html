{% extends "assets/base.html" %}

{% block content %}
<h1>Add Maintenance Record</h1>
<p>Asset: <strong>{{ asset.name }}</strong></p>

<form method="post" class="mt-3">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_service_date" class="form-label">Service Date</label>
        {{ form.service_date }}
    </div>
    <div class="mb-3">
        <label for="id_description" class="form-label">Description</label>
        {{ form.description }}
    </div>
    <div class="mb-3">
        <label for="id_cost" class="form-label">Cost</label>
        {{ form.cost }}
    </div>
    <button type="submit" class="btn btn-primary">Save Record</button>
    <a href="{% url 'asset-detail' asset.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
